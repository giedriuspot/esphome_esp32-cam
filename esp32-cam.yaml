esphome:
  name: esp32-cam2
  friendly_name: ESP32-CAM2
  on_boot:
    priority: -100
    then:
      - lambda: |-
          if (id(cam_xclk_mhz) != 20) {
            camera_config_t config;
            config.ledc_channel = LEDC_CHANNEL_0;
            config.ledc_timer   = LEDC_TIMER_0;
            config.pin_d0       = 5;
            config.pin_d1       = 18;
            config.pin_d2       = 19;
            config.pin_d3       = 21;
            config.pin_d4       = 36;
            config.pin_d5       = 39;
            config.pin_d6       = 34;
            config.pin_d7       = 35;
            config.pin_xclk     = 0;
            config.pin_pclk     = 22;
            config.pin_vsync    = 25;
            config.pin_href     = 23;
            config.pin_sccb_sda = 26;
            config.pin_sccb_scl = 27;
            config.pin_pwdn     = 32;
            config.pin_reset    = -1;
            config.xclk_freq_hz = id(cam_xclk_mhz) * 1000000;
            config.pixel_format = PIXFORMAT_JPEG;
            config.frame_size   = FRAMESIZE_SVGA;
            config.jpeg_quality = 10;
            config.fb_count     = 2;
            config.fb_location  = CAMERA_FB_IN_PSRAM;
            config.grab_mode    = CAMERA_GRAB_WHEN_EMPTY;
            esp_camera_deinit();
            esp_camera_init(&config);
          }

          sensor_t *s = esp_camera_sensor_get();
          if (!s) return;
          s->set_brightness(s,     id(cam_brightness));
          s->set_contrast(s,       id(cam_contrast));
          s->set_saturation(s,     id(cam_saturation));
          s->set_hmirror(s,        id(cam_hmirror));
          s->set_vflip(s,          id(cam_vflip));
          s->set_whitebal(s,       id(cam_awb));
          s->set_gain_ctrl(s,      id(cam_agc));
          s->set_exposure_ctrl(s,  id(cam_aec));
          s->set_aec2(s,           id(cam_aec2));
          s->set_awb_gain(s,       id(cam_awb_gain));
          s->set_lenc(s,           id(cam_lenc));
          s->set_raw_gma(s,        id(cam_raw_gma));
          s->set_dcw(s,            id(cam_dcw));
          s->set_bpc(s,            id(cam_bpc));
          s->set_wpc(s,            id(cam_wpc));
          s->set_quality(s,        id(cam_jpeg_quality));
          s->set_ae_level(s,       id(cam_ae_level));
          s->set_aec_value(s,      id(cam_aec_value));
          s->set_agc_gain(s,       id(cam_agc_gain));
          s->set_gainceiling(s,    (gainceiling_t)id(cam_gain_ceiling));
          s->set_special_effect(s, id(cam_special_effect));
          s->set_wb_mode(s,        id(cam_wb_mode));

esp32:
  board: esp32dev
  framework:
    type: arduino

logger:

web_server:
  version: 3
  sorting_groups:
    - id: group_image
      name: "Image"
      sorting_weight: 1
    - id: group_exposure
      name: "Exposure"
      sorting_weight: 2
    - id: group_white_balance
      name: "White Balance"
      sorting_weight: 3
    - id: group_orientation
      name: "Orientation"
      sorting_weight: 4
    - id: group_processing
      name: "Processing"
      sorting_weight: 5
    - id: group_camera
      name: "Camera"
      sorting_weight: 6
    - id: group_diagnostics
      name: "Diagnostics"
      sorting_weight: 7

captive_portal:
mdns:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "ESP32-CAM2 Fallback"
    password: !secret ap_password

psram:

