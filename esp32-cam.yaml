number:
  - platform: template
    name: "Brightness"
    id: num_brightness
    icon: "mdi:brightness-5"
    web_server:
      sorting_group_id: group_image
    min_value: -2
    max_value: 2
    step: 1
    initial_value: 0
    restore_value: true
    optimistic: true
    set_action:
      - globals.set:
          id: cam_brightness
          value: !lambda 'return (int)x;'
      - lambda: |-
          sensor_t *s = esp_camera_sensor_get();
          if (s) s->set_brightness(s, (int)x);

