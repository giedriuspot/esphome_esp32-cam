    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    turn_on_action:
      - globals.set:
          id: cam_awb
          value: '1'
      - lambda: |-
          sensor_t *s = esp_camera_sensor_get();
          if (s) s->set_whitebal(s, 1);
    turn_off_action:
      - globals.set:
          id: cam_awb
          value: '0'
      - lambda: |-
          sensor_t *s = esp_camera_sensor_get();
          if (s) s->set_whitebal(s, 0);

  - platform: template
    name: "AWB Gain"
    id: sw_awb_gain
    icon: "mdi:white-balance-sunny"
    web_server:
      sorting_group_id: group_white_balance
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    turn_on_action:
      - globals.set:
          id: cam_awb_gain
          value: '1'
      - lambda: |-
          sensor_t *s = esp_camera_sensor_get();
          if (s) s->set_awb_gain(s, 1);
    turn_off_action:
      - globals.set:
          id: cam_awb_gain
          value: '0'
      - lambda: |-
          sensor_t *s = esp_camera_sensor_get();
          if (s) s->set_awb_gain(s, 0);

