# ─── Selects ──────────────────────────────────────────────

select:
  - platform: template
    name: "Resolution"
    id: sel_resolution
    icon: "mdi:fit-to-screen"
    web_server:
      sorting_group_id: group_image
    options:
      - "QVGA 320x240"
      - "VGA 640x480"
      - "SVGA 800x600"
      - "XGA 1024x768"
      - "SXGA 1280x1024"
      - "UXGA 1600x1200"
    initial_option: "SVGA 800x600"
    restore_value: true
    optimistic: true
    set_action:
      - lambda: |-
          sensor_t *s = esp_camera_sensor_get();
          if (!s) return;
          int res = 9;
          if (x == "QVGA 320x240")   res = 5;
          if (x == "VGA 640x480")    res = 8;
          if (x == "SVGA 800x600")   res = 9;
          if (x == "XGA 1024x768")   res = 10;
          if (x == "SXGA 1280x1024") res = 12;
          if (x == "UXGA 1600x1200") res = 13;
          s->set_framesize(s, (framesize_t)res);

  - platform: template
    name: "Special Effect"
    id: sel_special_effect
    icon: "mdi:magic-staff"
    web_server:
      sorting_group_id: group_image
    options:
      - "None"
      - "Negative"
      - "Grayscale"
      - "Red Tint"
      - "Green Tint"
      - "Blue Tint"
      - "Sepia"
    initial_option: "None"
    restore_value: true
    optimistic: true
    set_action:
      - globals.set:
          id: cam_special_effect
          value: !lambda |-
            if (x == "Negative")   return 1;
            if (x == "Grayscale")  return 2;
            if (x == "Red Tint")   return 3;
            if (x == "Green Tint") return 4;
            if (x == "Blue Tint")  return 5;
            if (x == "Sepia")      return 6;
            return 0;
      - lambda: |-
          sensor_t *s = esp_camera_sensor_get();
          if (!s) return;
          int effect = 0;
          if (x == "Negative")   effect = 1;
          if (x == "Grayscale")  effect = 2;
          if (x == "Red Tint")   effect = 3;
          if (x == "Green Tint") effect = 4;
          if (x == "Blue Tint")  effect = 5;
          if (x == "Sepia")      effect = 6;
          s->set_special_effect(s, effect);

  - platform: template
    name: "Gain Ceiling"
    id: sel_gain_ceiling
    icon: "mdi:arrow-collapse-up"
    web_server:
      sorting_group_id: group_exposure
    options:
      - "2x"
      - "4x"
      - "8x"
      - "16x"
      - "32x"
      - "64x"
      - "128x"
    initial_option: "2x"
    restore_value: true
    optimistic: true
    set_action:
      - globals.set:
          id: cam_gain_ceiling
          value: !lambda |-
            if (x == "4x")   return 1;
            if (x == "8x")   return 2;
            if (x == "16x")  return 3;
            if (x == "32x")  return 4;
            if (x == "64x")  return 5;
            if (x == "128x") return 6;
            return 0;
      - lambda: |-
          sensor_t *s = esp_camera_sensor_get();
          if (!s) return;
          int gc = 0;
          if (x == "4x")   gc = 1;
          if (x == "8x")   gc = 2;
          if (x == "16x")  gc = 3;
          if (x == "32x")  gc = 4;
          if (x == "64x")  gc = 5;
          if (x == "128x") gc = 6;
          s->set_gainceiling(s, (gainceiling_t)gc);

  - platform: template
    name: "White Balance Mode"
    id: sel_wb_mode
    icon: "mdi:white-balance-auto"
    web_server:
      sorting_group_id: group_white_balance
    options:
      - "Auto"
      - "Sunny"
      - "Cloudy"
      - "Office"
      - "Home"
    initial_option: "Auto"
    restore_value: true
    optimistic: true
    set_action:
      - globals.set:
          id: cam_wb_mode
          value: !lambda |-
            if (x == "Sunny")  return 1;
            if (x == "Cloudy") return 2;
            if (x == "Office") return 3;
            if (x == "Home")   return 4;
            return 0;
      - lambda: |-
          sensor_t *s = esp_camera_sensor_get();
          if (!s) return;
          int mode = 0;
          if (x == "Sunny")  mode = 1;
          if (x == "Cloudy") mode = 2;
          if (x == "Office") mode = 3;
          if (x == "Home")   mode = 4;
          s->set_wb_mode(s, mode);

  - platform: template
    name: "Clock Frequency"
    id: sel_xclk
    icon: "mdi:sine-wave"
    entity_category: config
    web_server:
      sorting_group_id: group_diagnostics
    options:
      - "8 MHz"
      - "9 MHz"
      - "10 MHz"
      - "11 MHz"
      - "12 MHz"
      - "13 MHz"
      - "14 MHz"
      - "15 MHz"
      - "16 MHz"
      - "17 MHz"
      - "18 MHz"
      - "19 MHz"
      - "20 MHz"
      - "21 MHz"
      - "22 MHz"
      - "23 MHz"
      - "24 MHz"
      - "25 MHz"
      - "26 MHz"
      - "27 MHz"
      - "28 MHz"
      - "29 MHz"
      - "30 MHz"
    initial_option: "20 MHz"
    restore_value: true
    optimistic: true
    set_action:
      - globals.set:
          id: cam_xclk_mhz
          value: !lambda 'return (int)atoi(x.c_str());'
      - globals.set:
          id: pending_reboot
          value: 'true'

# ─── Switches ─────────────────────────────────────────────

switch:
  - platform: template
    name: "Auto Exposure Control"
    id: sw_aec
    icon: "mdi:camera-iris"
    web_server:
      sorting_group_id: group_exposure
    restore_mode: RESTORE_DEFAULT_ON
    optimistic: true
    turn_on_action:
      - globals.set:
          id: cam_aec
          value: '1'
      - lambda: |-
          sensor_t *s = esp_camera_sensor_get();
          if (s) s->set_exposure_ctrl(s, 1);
    turn_off_action:
      - globals.set:
          id: cam_aec
          value: '0'
      - lambda: |-
          sensor_t *s = esp_camera_sensor_get();
          if (s) s->set_exposure_ctrl(s, 0);

  - platform: template
    name: "AEC DSP"
