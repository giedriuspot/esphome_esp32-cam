    restore_value: true
    initial_value: '1'
  - id: cam_awb_gain
    type: int
    restore_value: true
    initial_value: '1'
  - id: cam_agc
    type: int
    restore_value: true
    initial_value: '1'
  - id: cam_aec
    type: int
    restore_value: true
    initial_value: '1'
  - id: cam_aec2
    type: int
    restore_value: true
    initial_value: '1'
  - id: cam_lenc
    type: int
    restore_value: true
    initial_value: '1'
  - id: cam_raw_gma
    type: int
    restore_value: true
    initial_value: '1'
  - id: cam_dcw
    type: int
    restore_value: true
    initial_value: '1'
  - id: cam_bpc
    type: int
    restore_value: true
    initial_value: '1'
  - id: cam_wpc
    type: int
    restore_value: true
    initial_value: '1'
  - id: cam_jpeg_quality
    type: int
    restore_value: true
    initial_value: '10'
  - id: cam_ae_level
    type: int
    restore_value: true
    initial_value: '0'
  - id: cam_aec_value
    type: int
    restore_value: true
    initial_value: '300'
  - id: cam_agc_gain
    type: int
    restore_value: true
    initial_value: '0'
  - id: cam_gain_ceiling
    type: int
    restore_value: true
    initial_value: '0'
  - id: cam_special_effect
    type: int
    restore_value: true
    initial_value: '0'
  - id: cam_wb_mode
    type: int
    restore_value: true
    initial_value: '0'
  - id: cam_xclk_mhz
    type: int
    restore_value: true
    initial_value: '20'
  - id: pending_reboot
    type: bool
    restore_value: false
    initial_value: 'false'

interval:
  - interval: 5s
    then:
      - lambda: |-
          if (id(pending_reboot)) {
            id(pending_reboot) = false;
            global_preferences->sync();
            delay(200);
            App.safe_reboot();
          }

i2c:
  id: camera_i2c
  sda: GPIO26
  scl: GPIO27

esp32_camera:
  name: "ESP32 Camera"
  external_clock:
    pin:
      number: GPIO0
      ignore_strapping_warning: true
    frequency: 20MHz
  i2c_id: camera_i2c
  data_pins:
    - number: GPIO5
      ignore_strapping_warning: true
    - GPIO18
    - GPIO19
    - GPIO21
    - GPIO36
    - GPIO39
    - GPIO34
    - GPIO35
  vsync_pin: GPIO25
  href_pin: GPIO23
  pixel_clock_pin: GPIO22
  power_down_pin: GPIO32
  resolution: 800x600
  jpeg_quality: 10
  vertical_flip: false
  horizontal_mirror: false
  idle_framerate: 0.1fps

esp32_camera_web_server:
  - port: 8080
    mode: stream
  - port: 8081
    mode: snapshot

# ─── Output & Light ───────────────────────────────────────

output:
  - platform: ledc
    pin: GPIO4
    channel: 2
    id: flash_led

light:
  - platform: monochromatic
    output: flash_led
    name: "Camera Flash"
    web_server:
      sorting_group_id: group_camera

# ─── Binary Sensor ────────────────────────────────────────

binary_sensor:
  - platform: template
    name: "Reboot Pending"
    icon: "mdi:timer-sand"
    entity_category: diagnostic
    web_server:
      sorting_group_id: group_diagnostics
    lambda: |-
      return id(pending_reboot);

# ─── Buttons ──────────────────────────────────────────────

button:
  - platform: template
    name: "Restore Defaults"
    icon: "mdi:restore"
    entity_category: config
    web_server:
      sorting_group_id: group_diagnostics
    on_press:
      then:
        - lambda: |-
            id(cam_brightness)     = 0;
            id(cam_contrast)       = 0;
            id(cam_saturation)     = 0;
            id(cam_hmirror)        = 0;
            id(cam_vflip)          = 0;
            id(cam_awb)            = 1;
            id(cam_awb_gain)       = 1;
            id(cam_agc)            = 1;
            id(cam_aec)            = 1;
            id(cam_aec2)           = 1;
            id(cam_lenc)           = 1;
            id(cam_raw_gma)        = 1;
            id(cam_dcw)            = 1;
            id(cam_bpc)            = 1;
            id(cam_wpc)            = 1;
            id(cam_jpeg_quality)   = 10;
            id(cam_ae_level)       = 0;
            id(cam_aec_value)      = 300;
            id(cam_agc_gain)       = 0;
            id(cam_gain_ceiling)   = 0;
            id(cam_special_effect) = 0;
            id(cam_wb_mode)        = 0;
            id(cam_xclk_mhz)      = 20;
        - number.set:
            id: num_brightness
            value: 0
        - number.set:
            id: num_contrast
            value: 0
        - number.set:
            id: num_saturation
            value: 0
        - number.set:
            id: num_jpeg_quality
            value: 10
        - number.set:
            id: num_aec_value
            value: 300
        - number.set:
            id: num_ae_level
            value: 0
        - number.set:
            id: num_agc_gain
            value: 0
        - select.set:
            id: sel_resolution
            option: "SVGA 800x600"
        - select.set:
            id: sel_special_effect
            option: "None"
        - select.set:
            id: sel_gain_ceiling
            option: "2x"
        - select.set:
            id: sel_wb_mode
            option: "Auto"
        - select.set:
            id: sel_xclk
            option: "20 MHz"
        - switch.turn_on:
            id: sw_aec
        - switch.turn_on:
            id: sw_aec2
        - switch.turn_on:
            id: sw_agc
        - switch.turn_on:
            id: sw_awb
        - switch.turn_on:
            id: sw_awb_gain
        - switch.turn_off:
            id: sw_hmirror
        - switch.turn_off:
            id: sw_vflip
        - switch.turn_on:
            id: sw_lenc
        - switch.turn_on:
            id: sw_raw_gma
        - switch.turn_on:
            id: sw_dcw
        - switch.turn_on:
            id: sw_bpc
        - switch.turn_on:
            id: sw_wpc
        - switch.turn_off:
            id: sw_colorbar
        - lambda: |-
            global_preferences->sync();
        - delay: 200ms
        - lambda: |-
            id(pending_reboot) = true;

  - platform: template
    name: "Restart"
    icon: "mdi:restart"
    entity_category: config
    web_server:
      sorting_group_id: group_diagnostics
    on_press:
      then:
        - lambda: |-
            id(pending_reboot) = true;

